version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: lia_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    networks:
      - lia_network_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    image: lia_backend:latest
    container_name: lia_backend_prod
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 server:app
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      ENV: production
      DEBUG: "False"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - lia_network_prod

  # Agent Service (Voice Assistant) - PRODUCTION MODE
  agent:
    image: lia_backend:latest
    container_name: lia_agent_prod
    command: python agent.py start  
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LIVEKIT_URL: ${LIVEKIT_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - lia_network_prod

  # Frontend
  frontend:
    image: lia_frontend:latest
    container_name: lia_frontend_prod
    environment:
      VITE_API_URL: https://${DOMAIN_NAME}/api
    restart: always
    networks:
      - lia_network_prod

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lia_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - lia_network_prod

  # Optional: Certbot for SSL certificate renewal
  certbot:
    image: certbot/certbot
    container_name: lia_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./certbot/logs:/var/log/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - lia_network_prod
    profiles: ["ssl"]

volumes:
  postgres_data_prod:
    driver: local

networks:
  lia_network_prod:
    driver: bridge
